<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS GAMES — Play Free Online Games</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050508;
    --surface: #0d0d14;
    --panel: #11111c;
    --accent: #00f0ff;
    --accent2: #ff2d78;
    --accent3: #ffe600;
    --text: #e0e8ff;
    --muted: #4a4a6a;
    --border: #1e1e32;
    --glow: 0 0 18px rgba(0,240,255,0.35);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* SCANLINE OVERLAY */
  body::before {
    content:'';
    position:fixed; inset:0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,240,255,0.012) 2px, rgba(0,240,255,0.012) 4px);
    pointer-events:none; z-index:9999;
  }

  /* HEADER */
  header {
    display:flex; align-items:center; justify-content:space-between;
    padding: 18px 40px;
    background: linear-gradient(90deg, #07071299 0%, #0d0d1a 100%);
    border-bottom: 1px solid var(--border);
    position: sticky; top:0; z-index:100;
    backdrop-filter: blur(12px);
  }
  .logo {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 1.6rem;
    letter-spacing: 3px;
    color: var(--accent);
    text-shadow: var(--glow);
  }
  .logo span { color: var(--accent2); }

  /* SEARCH */
  .search-bar {
    display:flex; gap:10px; align-items:center;
  }
  .search-bar input {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 16px;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    width: 260px;
    outline: none;
    transition: border .2s, box-shadow .2s;
  }
  .search-bar input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 10px rgba(0,240,255,0.2);
  }
  .search-bar input::placeholder { color: var(--muted); }

  /* CATEGORIES */
  .categories {
    display:flex; gap:10px; padding: 18px 40px;
    overflow-x:auto; scrollbar-width:none;
    border-bottom: 1px solid var(--border);
  }
  .categories::-webkit-scrollbar { display:none; }
  .cat-btn {
    flex-shrink:0;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 30px;
    padding: 7px 20px;
    color: var(--muted);
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing:1px;
    cursor:pointer;
    transition: all .2s;
    text-transform: uppercase;
  }
  .cat-btn:hover, .cat-btn.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    box-shadow: var(--glow);
  }

  /* LAYOUT */
  .layout {
    display:flex; min-height: calc(100vh - 130px);
  }

  /* GAME GRID */
  .main {
    flex:1; padding: 30px 40px;
  }
  .section-title {
    font-family: 'Orbitron', monospace;
    font-size: 0.75rem;
    letter-spacing: 4px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 20px;
    display:flex; align-items:center; gap:12px;
  }
  .section-title::after {
    content:''; flex:1; height:1px; background: var(--border);
  }
  .games-grid {
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 18px;
  }

  /* CARD */
  .game-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow:hidden;
    cursor:pointer;
    transition: transform .2s, border-color .2s, box-shadow .2s;
    position:relative;
  }
  .game-card:hover {
    transform: translateY(-4px) scale(1.02);
    border-color: var(--accent);
    box-shadow: 0 6px 28px rgba(0,240,255,0.18);
  }
  .game-card .thumb {
    width:100%; aspect-ratio:16/9;
    object-fit:cover;
    display:block;
    background: #1a1a2e;
  }
  .thumb-placeholder {
    width:100%; aspect-ratio:16/9;
    display:flex; align-items:center; justify-content:center;
    font-size: 2.5rem;
    background: linear-gradient(135deg, #0d0d20, #1a1a35);
  }
  .game-card .info {
    padding: 12px 14px;
  }
  .game-card .name {
    font-family: 'Orbitron', monospace;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing:1px;
    color: var(--text);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .game-card .cat-tag {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 3px;
    text-transform:uppercase; letter-spacing:1px;
  }
  .badge-hot {
    position:absolute; top:8px; right:8px;
    background: var(--accent2);
    color:#fff;
    font-size:0.6rem;
    font-family:'Orbitron',monospace;
    letter-spacing:1px;
    padding: 2px 7px;
    border-radius: 20px;
  }

  /* PLAY MODAL */
  .modal-overlay {
    display:none;
    position:fixed; inset:0;
    background: rgba(0,0,0,0.92);
    z-index:1000;
    flex-direction:column;
    align-items:center; justify-content:center;
    padding: 20px;
  }
  .modal-overlay.open { display:flex; }
  .modal-box {
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 12px;
    width: 100%; max-width: 1100px;
    box-shadow: 0 0 60px rgba(0,240,255,0.2);
    overflow:hidden;
  }
  .modal-header {
    display:flex; align-items:center; justify-content:space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  .modal-title {
    font-family: 'Orbitron', monospace;
    font-size: 0.9rem;
    letter-spacing: 2px;
    color: var(--accent);
  }
  .modal-close {
    background: none; border: none;
    color: var(--muted); font-size: 1.5rem;
    cursor:pointer; line-height:1;
    transition: color .2s;
  }
  .modal-close:hover { color: var(--accent2); }
  .modal-fullscreen-btn {
    background: var(--border);
    border: 1px solid var(--muted);
    color: var(--text);
    font-size: 0.75rem;
    font-family: 'Rajdhani', sans-serif;
    letter-spacing:1px;
    padding: 5px 14px;
    border-radius:4px;
    cursor:pointer;
    transition: background .2s;
    text-transform:uppercase;
  }
  .modal-fullscreen-btn:hover { background: var(--accent); color:#000; }
  #game-frame {
    width:100%;
    height: 600px;
    border:none;
    display:block;
    background:#000;
  }
  .modal-actions {
    display:flex; gap:10px; align-items:center;
  }

  /* FOOTER */
  footer {
    text-align:center;
    padding: 30px;
    color: var(--muted);
    font-size: 0.8rem;
    letter-spacing:2px;
    border-top: 1px solid var(--border);
    font-family:'Orbitron', monospace;
  }

  /* SCROLL */
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius:3px; }

  @media(max-width:600px) {
    header { padding: 14px 18px; }
    .logo { font-size:1.1rem; }
    .search-bar input { width:140px; }
    .main { padding: 20px 16px; }
    .categories { padding: 14px 16px; }
    #game-frame { height: 300px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">NEX<span>US</span> GAMES</div>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search games..." oninput="filterGames()">
  </div>
</header>

<!-- CATEGORIES -->
<div class="categories" id="categories">
  <button class="cat-btn active" onclick="filterByCategory('all', this)">All</button>
  <button class="cat-btn" onclick="filterByCategory('action', this)">Action</button>
  <button class="cat-btn" onclick="filterByCategory('puzzle', this)">Puzzle</button>
  <button class="cat-btn" onclick="filterByCategory('racing', this)">Racing</button>
  <button class="cat-btn" onclick="filterByCategory('io', this)">.IO</button>
  <button class="cat-btn" onclick="filterByCategory('shooter', this)">Shooter</button>
  <button class="cat-btn" onclick="filterByCategory('adventure', this)">Adventure</button>
  <button class="cat-btn" onclick="filterByCategory('strategy', this)">Strategy</button>
  <button class="cat-btn" onclick="filterByCategory('arcade', this)">Arcade</button>
  <button class="cat-btn" onclick="filterByCategory('sports', this)">Sports</button>
</div>

<!-- MAIN -->
<div class="layout">
  <div class="main">
    <div class="section-title">🎮 Games Library</div>
    <div class="games-grid" id="gamesGrid"></div>
  </div>
</div>

<!-- FOOTER -->
<footer>NEXUS GAMES &nbsp;|&nbsp; PLAY FREE &nbsp;|&nbsp; NO DOWNLOAD</footer>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box" id="modalBox">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">GAME</div>
      <div class="modal-actions">
        <button class="modal-fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
    </div>
    <iframe id="game-frame" src="" allowfullscreen allow="fullscreen; autoplay"></iframe>
  </div>
</div>

<script>
const games = [
  // .IO
  { name:"Agar.io", cat:"io", emoji:"🟢", url:"https://agar.io", hot:true },
  { name:"Slither.io", cat:"io", emoji:"🐍", url:"https://slither.io", hot:true },
  { name:"Paper.io 2", cat:"io", emoji:"📄", url:"https://paper-io.com" },
  { name:"Wormate.io", cat:"io", emoji:"🐛", url:"https://wormate.io" },
  { name:"Splix.io", cat:"io", emoji:"🔷", url:"https://splix.io" },
  // PUZZLE
  { name:"2048", cat:"puzzle", emoji:"🔢", url:"https://play2048.co" },
  { name:"Tetris", cat:"puzzle", emoji:"🟦", url:"https://tetris.com/play-tetris", hot:true },
  { name:"Sudoku", cat:"puzzle", emoji:"🔵", url:"https://sudoku.com" },
  { name:"Wordle", cat:"puzzle", emoji:"🟩", url:"https://www.nytimes.com/games/wordle/index.html" },
  // RACING
  { name:"MotoX3M", cat:"racing", emoji:"🏍️", url:"https://www.crazygames.com/embed/moto-x3m", hot:true },
  { name:"Road Fury", cat:"racing", emoji:"🚗", url:"https://www.crazygames.com/embed/road-fury" },
  { name:"Drift Hunters", cat:"racing", emoji:"🏎️", url:"https://drifthunters.com", hot:true },
  // SHOOTER
  { name:"Krunker.io", cat:"shooter", emoji:"🎯", url:"https://krunker.io", hot:true },
  { name:"Shell Shockers", cat:"shooter", emoji:"🥚", url:"https://shellshock.io" },
  { name:"Bullet Force", cat:"shooter", emoji:"🔫", url:"https://www.crazygames.com/embed/bullet-force-multiplayer" },
  // ACTION
  { name:"Stickman Hook", cat:"action", emoji:"🕺", url:"https://www.crazygames.com/embed/stickman-hook", hot:true },
  { name:"Vex 7", cat:"action", emoji:"🏃", url:"https://www.crazygames.com/embed/vex-7" },
  { name:"Fireboy & Watergirl", cat:"action", emoji:"🔥", url:"https://www.coolmathgames.com/0-fireboy-and-watergirl-in-the-forest-temple" },
  // ADVENTURE
  { name:"Minecraft Classic", cat:"adventure", emoji:"⛏️", url:"https://classic.minecraft.net", hot:true },
  { name:"Dino Game", cat:"arcade", emoji:"🦕", url:"https://chromedino.com" },
  { name:"Little Alchemy 2", cat:"adventure", emoji:"⚗️", url:"https://littlealchemy2.com" },
  // STRATEGY
  { name:"Chess", cat:"strategy", emoji:"♟️", url:"https://www.chess.com/play/computer" },
  { name:"Bloons TD 5", cat:"strategy", emoji:"🎈", url:"https://www.coolmathgames.com/0-bloons-tower-defense-5" },
  // ARCADE
  { name:"Pac-Man", cat:"arcade", emoji:"🟡", url:"https://www.google.com/logos/2010/pacman10-i.html", hot:true },
  { name:"Snake", cat:"arcade", emoji:"🐍", url:"https://www.google.com/fbx?fbx=snake_arcade" },
  { name:"Flappy Bird", cat:"arcade", emoji:"🐦", url:"https://flappybird.io" },
  { name:"Cut the Rope", cat:"puzzle", emoji:"🍬", url:"https://www.crazygames.com/embed/cut-the-rope-remastered" },
  // SPORTS
  { name:"Basketball Stars", cat:"sports", emoji:"🏀", url:"https://www.crazygames.com/embed/basketball-stars", hot:true },
  { name:"Table Tennis World Tour", cat:"sports", emoji:"🏓", url:"https://www.crazygames.com/embed/table-tennis-world-tour" },
];

let currentCategory = 'all';

function renderGames(list) {
  const grid = document.getElementById('gamesGrid');
  if (!list.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;color:var(--muted);font-family:'Orbitron',monospace;font-size:.8rem;letter-spacing:3px;padding:40px 0;">NO GAMES FOUND</div>`;
    return;
  }
  grid.innerHTML = list.map((g, i) => `
    <div class="game-card" onclick="openGame('${g.url}','${g.name}')" style="animation-delay:${i*30}ms">
      <div class="thumb-placeholder">${g.emoji}</div>
      ${g.hot ? `<div class="badge-hot">HOT</div>` : ''}
      <div class="info">
        <div class="name">${g.name}</div>
        <div class="cat-tag">${g.cat}</div>
      </div>
    </div>
  `).join('');
}

function filterByCategory(cat, btn) {
  currentCategory = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function filterGames() { applyFilters(); }

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let list = games;
  if (currentCategory !== 'all') list = list.filter(g => g.cat === currentCategory);
  if (q) list = list.filter(g => g.name.toLowerCase().includes(q) || g.cat.includes(q));
  renderGames(list);
}

function openGame(url, name) {
  document.getElementById('modalTitle').textContent = name.toUpperCase();
  document.getElementById('game-frame').src = url;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('game-frame').src = '';
  document.body.style.overflow = '';
}

function toggleFullscreen() {
  const frame = document.getElementById('game-frame');
  if (frame.requestFullscreen) frame.requestFullscreen();
  else if (frame.webkitRequestFullscreen) frame.webkitRequestFullscreen();
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// INIT
renderGames(games);
</script>
</body>
</html>
