<style>
  :root {
    --cyan: #00f5ff;
    --pink: #ff0080;
    --purple: #7b00ff;
    --dark: #020008;
    --card: #0a0018;
    --border: #1a003a;
    --text: #c0a8ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(0,245,255,0.015) 40px, rgba(0,245,255,0.015) 41px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(0,245,255,0.015) 40px, rgba(0,245,255,0.015) 41px);
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  header {
    position: relative;
    z-index: 10;
    padding: 18px 30px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: rgba(2,0,8,0.95);
    backdrop-filter: blur(10px);
  }

  .logo {
    font-family: 'Orbitron', monospace;
    font-size: 1.8rem;
    font-weight: 900;
    background: linear-gradient(90deg, var(--cyan), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 4px;
    text-shadow: none;
    animation: logoPulse 3s ease-in-out infinite;
  }

  @keyframes logoPulse {
    0%, 100% { filter: drop-shadow(0 0 8px rgba(0,245,255,0.6)); }
    50% { filter: drop-shadow(0 0 20px rgba(255,0,128,0.8)); }
  }

  .logo span { color: var(--pink); -webkit-text-fill-color: var(--pink); }

  .search-bar {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .search-bar input {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 16px;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    width: 280px;
    outline: none;
    transition: border-color 0.3s;
  }

  .search-bar input:focus { border-color: var(--cyan); }
  .search-bar input::placeholder { color: rgba(192,168,255,0.35); }

  .search-bar button {
    background: linear-gradient(135deg, var(--purple), var(--pink));
    border: none;
    border-radius: 6px;
    padding: 8px 18px;
    color: #fff;
    font-family: 'Orbitron', monospace;
    font-size: 0.75rem;
    cursor: pointer;
    letter-spacing: 2px;
    transition: opacity 0.2s;
  }

  .search-bar button:hover { opacity: 0.8; }

  /* CATEGORIES */
  .categories {
    position: relative;
    z-index: 10;
    display: flex;
    gap: 10px;
    padding: 14px 30px;
    overflow-x: auto;
    border-bottom: 1px solid var(--border);
    background: rgba(2,0,8,0.7);
    scrollbar-width: none;
  }

  .categories::-webkit-scrollbar { display: none; }

  .cat-btn {
    background: rgba(123,0,255,0.12);
    border: 1px solid rgba(123,0,255,0.3);
    border-radius: 20px;
    padding: 6px 18px;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    letter-spacing: 1px;
  }

  .cat-btn:hover, .cat-btn.active {
    background: rgba(0,245,255,0.15);
    border-color: var(--cyan);
    color: var(--cyan);
    box-shadow: 0 0 12px rgba(0,245,255,0.2);
  }

  /* GAME VIEWER */
  #game-viewer {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: #000;
    flex-direction: column;
  }

  #game-viewer.active { display: flex; }

  .viewer-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: rgba(2,0,8,0.98);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .viewer-title {
    font-family: 'Orbitron', monospace;
    font-size: 1rem;
    color: var(--cyan);
    letter-spacing: 2px;
  }

  .viewer-controls { display: flex; gap: 10px; }

  .ctrl-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 16px;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }

  .ctrl-btn:hover { border-color: var(--pink); color: var(--pink); }

  .ctrl-btn.close-btn {
    background: rgba(255,0,128,0.15);
    border-color: var(--pink);
    color: var(--pink);
  }

  #game-frame-wrapper {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  #game-frame {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* GRID */
  .section-title {
    font-family: 'Orbitron', monospace;
    font-size: 1rem;
    letter-spacing: 3px;
    color: var(--cyan);
    padding: 24px 30px 12px;
    position: relative;
    z-index: 5;
    text-transform: uppercase;
  }

  .section-title::after {
    content: '';
    display: inline-block;
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, var(--cyan), transparent);
    vertical-align: middle;
    margin-left: 14px;
  }

  .games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
    padding: 0 30px 40px;
    position: relative;
    z-index: 5;
  }

  .game-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    group: true;
  }

  .game-card:hover {
    border-color: var(--cyan);
    transform: translateY(-4px);
    box-shadow: 0 8px 30px rgba(0,245,255,0.15), 0 0 0 1px rgba(0,245,255,0.1);
  }

  .game-card:hover .card-overlay { opacity: 1; }
  .game-card:hover .card-img { filter: brightness(0.6) saturate(1.2); }

  .card-img {
    width: 100%;
    aspect-ratio: 16/10;
    object-fit: cover;
    display: block;
    transition: filter 0.25s;
    background: linear-gradient(135deg, #0a0018, #12003a);
  }

  .card-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.25s;
    background: rgba(0,0,0,0.3);
  }

  .play-icon {
    width: 52px;
    height: 52px;
    background: linear-gradient(135deg, var(--cyan), var(--purple));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    color: #fff;
    box-shadow: 0 0 24px rgba(0,245,255,0.5);
  }

  .play-label {
    margin-top: 8px;
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    letter-spacing: 2px;
    color: var(--cyan);
  }

  .card-info {
    padding: 10px 12px;
    border-top: 1px solid var(--border);
  }

  .card-name {
    font-family: 'Orbitron', monospace;
    font-size: 0.75rem;
    letter-spacing: 1px;
    color: #e0d0ff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-tag {
    font-size: 0.72rem;
    color: rgba(192,168,255,0.45);
    margin-top: 3px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .badge-new {
    position: absolute;
    top: 8px;
    right: 8px;
    background: var(--pink);
    color: #fff;
    font-family: 'Orbitron', monospace;
    font-size: 0.55rem;
    letter-spacing: 1px;
    padding: 3px 7px;
    border-radius: 3px;
  }

  .badge-hot {
    position: absolute;
    top: 8px;
    right: 8px;
    background: linear-gradient(135deg, #ff6a00, #ff0080);
    color: #fff;
    font-family: 'Orbitron', monospace;
    font-size: 0.55rem;
    letter-spacing: 1px;
    padding: 3px 7px;
    border-radius: 3px;
  }

  /* NO RESULTS */
  .no-results {
    text-align: center;
    padding: 60px 30px;
    color: rgba(192,168,255,0.3);
    font-family: 'Orbitron', monospace;
    letter-spacing: 2px;
    font-size: 0.9rem;
    display: none;
  }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 20px;
    color: rgba(192,168,255,0.2);
    font-size: 0.8rem;
    letter-spacing: 2px;
    border-top: 1px solid var(--border);
    position: relative;
    z-index: 5;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--dark); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--purple); }

  /* Loading */
  .loader {
    position: absolute;
    inset: 0;
    background: var(--dark);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 5;
    gap: 16px;
  }

  .loader-ring {
    width: 60px;
    height: 60px;
    border: 3px solid var(--border);
    border-top-color: var(--cyan);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loader-text {
    font-family: 'Orbitron', monospace;
    font-size: 0.75rem;
    color: var(--cyan);
    letter-spacing: 3px;
    animation: blink 1.2s ease-in-out infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .hidden { display: none !important; }
</style>
</head>

  const filtered = GAMES.filter(g => {
    const matchCat = currentFilter === 'all' || g.tag === currentFilter;
    const matchSearch = g.name.toLowerCase().includes(currentSearch.toLowerCase());
    return matchCat && matchSearch;
  });

  if (filtered.length === 0) {
    noRes.style.display = 'block';
    return;
  }
  noRes.style.display = 'none';

  filtered.forEach(game => {
    const card = document.createElement('div');
    card.className = 'game-card';
    card.onclick = () => openGame(game);

    let badgeHTML = '';
    if (game.badge === 'new') badgeHTML = '<span class="badge-new">NEW</span>';
    if (game.badge === 'hot') badgeHTML = '<span class="badge-hot">🔥 HOT</span>';

    card.innerHTML = `
      ${badgeHTML}
      <img class="card-img" src="${game.thumb}" alt="${game.name}"
           onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAwIiBoZWlnaHQ9IjEyNSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMjAwIiBoZWlnaHQ9IjEyNSIgZmlsbD0iIzBhMDAxOCIvPjx0ZXh0IHg9IjUwJSIgeT0iNTAlIiBmb250LWZhbWlseT0ibW9ub3NwYWNlIiBmb250LXNpemU9IjI4IiBmaWxsPSIjMmEwMDVhIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBkeT0iLjNlbSI+🎮PC90ZXh0Pjwvc3ZnPg=='">
      <div class="card-overlay">
        <div class="play-icon">▶</div>
        <span class="play-label">JUGAR</span>
      </div>
      <div class="card-info">
        <div class="card-name">${game.name}</div>
        <div class="card-tag">${game.tag.toUpperCase()}</div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function openGame(game) {
  const viewer = document.getElementById('game-viewer');
  const frame = document.getElementById('game-frame');
  const loader = document.getElementById('loader');
  const title = document.getElementById('viewer-title');

  title.textContent = game.name.toUpperCase();
  frame.src = '';
  loader.classList.remove('hidden');
  viewer.classList.add('active');
  document.body.style.overflow = 'hidden';

  // Anti-restriction technique: set src after short delay, referrer no-referrer already set
  setTimeout(() => {
    frame.src = game.url;
    frame.onload = () => loader.classList.add('hidden');
    // Timeout fallback in case onload doesn't fire
    setTimeout(() => loader.classList.add('hidden'), 4000);
  }, 300);
}

function closeGame() {
  const viewer = document.getElementById('game-viewer');
  const frame = document.getElementById('game-frame');
  viewer.classList.remove('active');
  frame.src = '';
  document.body.style.overflow = '';
}

function reloadGame() {
  const frame = document.getElementById('game-frame');
  const loader = document.getElementById('loader');
  const src = frame.src;
  frame.src = '';
  loader.classList.remove('hidden');
  setTimeout(() => {
    frame.src = src;
    setTimeout(() => loader.classList.add('hidden'), 4000);
  }, 200);
}

function fullscreenGame() {
  const wrapper = document.getElementById('game-frame-wrapper');
  if (wrapper.requestFullscreen) wrapper.requestFullscreen();
  else if (wrapper.webkitRequestFullscreen) wrapper.webkitRequestFullscreen();
}

function filterCat(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGames();
}

function doSearch() {
  currentSearch = document.getElementById('searchInput').value;
  renderGames();
}

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

document.getElementById('searchInput').addEventListener('input', e => {
  currentSearch = e.target.value;
  renderGames();
});

// Close viewer on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('game-viewer').classList.contains('active')) {
    closeGame();
  }
});

renderGames();
</script>
